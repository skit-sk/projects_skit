<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Fundament RF{% endblock %}</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    {% block extra_head %}{% endblock %}
    <script>
        if (localStorage.getItem('theme') !== 'light') { document.documentElement.setAttribute('data-theme', 'dark'); localStorage.setItem('theme', 'dark'); }
    </script>
    <style>html[data-theme="dark"] {background:#1a1a1a;}</style>
</head>
<body>
    <header>
        <h1><a href="/">Fundament RF</a></h1>
    </header>
    <nav style="margin: 0 0 1rem; padding: 0.5rem; border-bottom: 1px solid var(--border-color); display:flex; justify-content:space-between; align-items:center;">
        <ul style="list-style:none; padding:0; margin:0; display:flex; gap:1rem;">
            <li><a href="{{ url_for('web.index') }}">Главная</a></li>
            <li><a href="{{ url_for('dashboard.index') }}">Dashboard</a></li>
            <li><a href="{{ url_for('graphics.all_charts') }}">Все графики</a></li>
            <li><a href="{{ url_for('processor_1d.metrics_page') }}">Метрики</a></li>
            <li><a href="{{ url_for('trade_analytics.index') }}">Trade Analytics</a></li>
            <li><a href="{{ url_for('ma_analytics.index') }}">База MA</a></li>
            <li><a href="{{ url_for('ccxt_api.index') }}">CCXT API</a></li>
            <li><a href="{{ url_for('ofd_api.index') }}" style="color:#8b5cf6;">🧪 OFD API</a></li>
            <li><a href="{{ url_for('web.range_variants_demo') }}">Range Demo</a></li>
            <li><a href="{{ url_for('account_api.index') }}">🔐 Account</a></li>
        </ul>
        <button onclick="toggleTheme()" style="background:var(--bg-card); border:1px solid var(--border-color); color:var(--text-main); padding:4px 8px; border-radius:4px; cursor:pointer;">🌙</button>
    </nav>
    <div id="globalProgress" style="display:none; position:fixed; top:0; left:0; width:100%; height:3px; background:var(--border-color); z-index:9999;">
        <div style="height:100%; width:0%; background:linear-gradient(90deg,#e67e22,#3498db,#e67e22); background-size:200%; animation:progressMove 1.5s ease-in-out infinite;"></div>
    </div>
    <div id="globalTimers" style="position:fixed; top:4px; right:8px; font-size:10px; z-index:9998; display:flex; gap:8px; background:var(--bg-card); padding:2px 6px; border-radius:4px; border:1px solid var(--border-color);">
        <span id="syncTimer"></span>
        <span id="readTimer"></span>
    </div>
    <style>
        @keyframes progressMove { 0%{background-position:0%} 100%{background-position:200%} }
    </style>
    <main>
        {% block content %}{% endblock %}
    </main>
    <script>
        function showProgress(on) {
            document.getElementById('globalProgress').style.display = on ? 'block' : 'none';
        }

        async function syncAll() {
            sessionStorage.setItem('timer_sync', '⏳ Sync...');
            document.getElementById('syncTimer').textContent = '⏳ Sync...';
            showProgress(true);
            var start = Date.now();
            try { await fetch('/api/sync-all', {method:'POST'}); } catch(e) {}
            var elapsed = ((Date.now() - start) / 1000).toFixed(1) + 's';
            sessionStorage.setItem('timer_sync', '🔄 Sync: ' + elapsed);
            showProgress(false);
            location.reload();
        }

        function reloadFromJSON() {
            sessionStorage.setItem('timer_read', '📂 Read: 0.0s');
            document.getElementById('readTimer').textContent = '📂 Read: 0.0s';
            location.reload();
        }

        document.addEventListener('DOMContentLoaded', function() {
            var s = sessionStorage.getItem('timer_sync');
            if (s) document.getElementById('syncTimer').textContent = s;
            var r = sessionStorage.getItem('timer_read');
            if (r) document.getElementById('readTimer').textContent = r;
        });

        function toggleTheme() {
            const html = document.documentElement;
            const isDark = html.getAttribute('data-theme') === 'dark';
            if (isDark) {
                html.removeAttribute('data-theme');
                localStorage.setItem('theme', 'light');
            } else {
                html.setAttribute('data-theme', 'dark');
                localStorage.setItem('theme', 'dark');
            }
        }
    </script>
</body>
</html>
